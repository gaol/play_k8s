# Baremetal K8s cluster configuration
# Single source of truth for provisioner, templates, and Ansible.

# Bootstrap host — runs DNS, HTTP, orchestrates Redfish calls
bootstrap_host:
  ip: "10.20.0.10"
  hostname: "bootstrap"
  interface: "eno1"
  dns_upstream: "8.8.8.8"
  http_port: 8080
  ssh:
    username: "admin"
    password: "password"
    public_key_file: "~/.ssh/id_rsa.pub"

# Network — sized for 500-2000 nodes
network:
  domain: "k8s.local"
  subnet: "10.20.0.0/16"
  gateway: "10.20.0.1"
  dns: "10.20.0.10"

# K8s API VIP (managed by keepalived across infra nodes)
k8s_api_vip:
  ip: "10.20.0.200"
  hostname: "k8s-api"

# OS configuration
os:
  name: "ubuntu"
  version: "22.04"
  iso_url: "https://releases.ubuntu.com/22.04.4/ubuntu-22.04.4-live-server-amd64.iso"
  iso_dir: "/opt/baremetal/iso"

# Node definitions
nodes:
  defaults:
    interface: "eno1"
    disk: "/dev/sda"
    redfish:
      scheme: "https"
      base_uri: "/redfish/v1/Systems/1"
      manager_uri: "/redfish/v1/Managers/1"
      virtual_media_slot: "CD"
      verify_ssl: false

  infra:
    - name: "infra1"
      ip: "10.20.0.11"
      bmc:
        address: "10.20.100.11"
        username: "admin"
        password: "admin"
    - name: "infra2"
      ip: "10.20.0.12"
      bmc:
        address: "10.20.100.12"
        username: "admin"
        password: "admin"
    - name: "infra3"
      ip: "10.20.0.13"
      bmc:
        address: "10.20.100.13"
        username: "admin"
        password: "admin"

  masters:
    - name: "master1"
      ip: "10.20.1.1"
      bmc:
        address: "10.20.100.21"
        username: "admin"
        password: "admin"
    - name: "master2"
      ip: "10.20.1.2"
      bmc:
        address: "10.20.100.22"
        username: "admin"
        password: "admin"
    - name: "master3"
      ip: "10.20.1.3"
      bmc:
        address: "10.20.100.23"
        username: "admin"
        password: "admin"
    - name: "master4"
      ip: "10.20.1.4"
      bmc:
        address: "10.20.100.24"
        username: "admin"
        password: "admin"
    - name: "master5"
      ip: "10.20.1.5"
      bmc:
        address: "10.20.100.25"
        username: "admin"
        password: "admin"

  workers:
    - name: "worker1"
      ip: "10.20.2.1"
      disk: "/dev/nvme0n1"
      bmc:
        address: "10.20.100.31"
        username: "admin"
        password: "admin"
      redfish:
        base_uri: "/redfish/v1/Systems/System.Embedded.1"

# Kubernetes configuration
k8s:
  version: "1.31"
  container_runtime: "cri-o"
  cni: "cilium"
  kube_proxy_mode: "ipvs"
  pod_network_cidr: "10.128.0.0/14"
  service_cidr: "10.96.0.0/16"
  operators: []
