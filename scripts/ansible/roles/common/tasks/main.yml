---
# --- Kernel modules and sysctl for K8s networking ---

- name: Persist kernel modules for K8s networking
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
  register: k8s_modules_file

- name: Load kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist sysctl settings for K8s networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-k8s.conf
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
  register: k8s_sysctl_file

- name: Apply sysctl settings
  ansible.builtin.command:
    cmd: sysctl --system
  when: k8s_sysctl_file.changed
  changed_when: true

# --- Disable swap ---

- name: Remove zram swap generator package
  ansible.builtin.dnf:
    name: zram-generator-defaults
    state: absent

- name: Disable all active swap
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: true

- name: Disable zram systemd service
  ansible.builtin.systemd:
    name: "systemd-zram-setup@zram0.service"
    enabled: false
    state: stopped
  failed_when: false

- name: Clear zram failed state
  ansible.builtin.command:
    cmd: systemctl reset-failed systemd-zram-setup@zram0.service
  failed_when: false
  changed_when: false

- name: Comment out swap entries in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s)'
    replace: '# \1'

# --- Reboot to apply kernel modules and sysctl persistently ---

- name: Reboot to apply kernel and sysctl settings
  ansible.builtin.reboot:
    msg: "Rebooting to apply K8s kernel modules and sysctl settings"
    reboot_timeout: 300
  when: k8s_modules_file.changed or k8s_sysctl_file.changed

- name: Verify ip_forward is enabled after reboot
  ansible.builtin.command:
    cmd: cat /proc/sys/net/ipv4/ip_forward
  register: ip_forward_check
  changed_when: false
  failed_when: ip_forward_check.stdout != "1"

# --- Packages ---

- name: Add CRI-O repository
  ansible.builtin.yum_repository:
    name: cri-o
    description: "CRI-O stable v{{ k8s_version }}"
    baseurl: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v{{ k8s_version }}/rpm/"
    gpgcheck: true
    gpgkey: "https://download.opensuse.org/repositories/isv:/cri-o:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key"

- name: Add Kubernetes repository
  ansible.builtin.yum_repository:
    name: kubernetes
    description: "Kubernetes stable v{{ k8s_version }}"
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/"
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/rpm/repodata/repomd.xml.key"

- name: Install CRI-O and Kubernetes packages
  ansible.builtin.dnf:
    name:
      - cri-o
      - kubelet
      - kubeadm
      - kubectl
      - iproute-tc
      - lvm2
    state: present

- name: Enable and start CRI-O
  ansible.builtin.systemd:
    name: crio
    enabled: true
    state: started

- name: Enable kubelet
  ansible.builtin.systemd:
    name: kubelet
    enabled: true

- name: Configure crictl to use CRI-O socket
  ansible.builtin.copy:
    dest: /etc/crictl.yaml
    content: |
      runtime-endpoint: unix:///var/run/crio/crio.sock
      image-endpoint: unix:///var/run/crio/crio.sock

# --- CNI plugins ---

- name: Create CNI plugin directory
  ansible.builtin.file:
    path: /opt/cni/bin
    state: directory
    mode: "0755"

- name: Detect architecture
  ansible.builtin.set_fact:
    cni_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' if ansible_architecture == 'aarch64' else ansible_architecture }}"

- name: Download CNI plugins
  ansible.builtin.get_url:
    url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/cni-plugins-linux-{{ cni_arch }}-v{{ cni_plugins_version }}.tgz"
    dest: /tmp/cni-plugins.tgz

- name: Extract CNI plugins
  ansible.builtin.unarchive:
    src: /tmp/cni-plugins.tgz
    dest: /opt/cni/bin
    remote_src: true
