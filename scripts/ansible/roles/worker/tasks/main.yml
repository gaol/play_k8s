---
- name: Check if node is already part of a cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Fail if join info is not available
  ansible.builtin.fail:
    msg: >
      Join info not available. master-init must run successfully first.
      Check that masters[0] completed without errors.
  when:
    - not kubelet_conf.stat.exists
    - "'k8s_join_info' not in hostvars"

- name: Join cluster as worker node
  ansible.builtin.command:
    cmd: "{{ hostvars['k8s_join_info']['kubeadm_join_command'] }}"
  when: not kubelet_conf.stat.exists
