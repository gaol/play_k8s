---
# K8s Day-1 cluster installation
# Run: ansible-playbook -i inventory.ini site.yml

- name: Install common packages on K8s nodes
  hosts: masters:workers
  roles:
    - common

- name: Configure HAProxy load balancer on infra node
  hosts: infra
  roles:
    - ha-control-plane

- name: Initialize first control plane node
  hosts: masters[0]
  roles:
    - master-init

- name: Install Calico CNI
  hosts: masters[0]
  roles:
    - calico

- name: Join additional control plane nodes
  hosts: masters[1:]
  serial: 1
  roles:
    - master-join

- name: Join worker nodes
  hosts: workers
  roles:
    - worker

- name: Install Longhorn prerequisites on worker nodes
  hosts: workers
  roles:
    - longhorn-prereqs

- name: Install OLM and catalog sources
  hosts: masters[0]
  roles:
    - olm
  when: install_operators | default(true)

- name: Install operators
  hosts: masters[0]
  roles:
    - operators
  when: install_operators | default(true)
