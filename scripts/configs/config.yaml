# K8s cluster Day-0 configuration
# Drives both the Python provisioner and Terraform templates.

# Terraform libvirt provider version
libvirt_provider_version: "0.9.3"

# libvirt daemon URI.
#   Local session:  qemu:///session
#   Local system:   qemu:///system
#   Remote via SSH: qemu+ssh://user@host/system
libvirt_uri: "qemu:///system"

# CPU architecture of the libvirt host.
#   x86_64 — standard PC/server (Linux hosts)
#   aarch64 — Apple Silicon / ARM64 (macOS hosts running libvirt via UTM/QEMU)
libvirt_arch: "x86_64"

# Directory on the libvirt host where all images and volumes are stored.
# The libvirtd user must have write access.
image_dir: "~/images/k8s"

# Directory where base OS images are downloaded (for http/https URLs).
# Kept separate from image_dir to avoid conflicts with the libvirt storage pool.
download_dir: "~/vms"

# SSH access for the provisioned VMs
ssh:
  username: "lgao"
  password: "password"
  # The file content is read at runtime and injected into cloud-init
  public_key_file: "~/.ssh/id_rsa.pub"

# Base OS image name (used as the libvirt volume name for the base image)
os_base_name: "fedora-43"

# Base OS qcow2 image URL.
#   file:// → local path on the libvirt host (no download needed)
#   https:// → downloaded to image_dir if libvirt is local; passed to libvirt if remote
#os_base_url: "https://dl.fedoraproject.org/pub/fedora/linux/releases/43/Cloud/x86_64/images/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2"
os_base_url: "file://~/vms/Fedora-Cloud-Base-Generic-43-1.6.x86_64.qcow2"

# Packages installed during cloud-init first boot
install_packages:
  - qemu-guest-agent
  - cloud-utils-growpart
  - python3
  - openssh-server
  - vim
  - curl

# Commands executed once during first boot (after packages are installed)
run_once_commands:
  - systemctl enable --now qemu-guest-agent
  - systemctl enable --now sshd

# Libvirt network configuration.
# A dedicated NAT network is created for the k8s cluster.
# libvirt's built-in dnsmasq provides DHCP and DNS for the subnet,
# with static host entries so VMs resolve each other by hostname.
#
# NOTE: If the 192.168.122.0/24 subnet is already in use by the libvirt
# 'default' network, either destroy it first or change the subnet here.
network:
  name: "k8s-net"
  domain: "k8s.local"
  subnet: "192.168.150.0/24"
  gateway: "192.168.150.1"
  dhcp_range:
    start: "192.168.150.100"
    end: "192.168.150.199"

# K8s API endpoint DNS entry.
# The hostname resolves to the infra node's IP via libvirt dnsmasq.
# All nodes use it as the --control-plane-endpoint for kubeadm init/join.
k8s_api_vip:
  ip: "192.168.150.30"
  hostname: "k8s-api"

# Cluster node definitions.
# Each node must have: name, ip.
# Optional per-node overrides: ifname, gateway4, memory, vcpu, disk_size, data_disk_size.
# Values not specified on a node are inherited from nodes.defaults.
nodes:
  defaults:
    ifname: "enp1s0"
    gateway4: "192.168.150.1"
    memory: "8192"
    vcpu: "4"
    disk_size: "40"
    data_disk_size: "0"

  infra:
    - name: k8s-infra1
      ip: 192.168.150.30
      memory: "4096"
      vcpu: "2"

  masters:
    - name: k8s-master1
      ip: 192.168.150.10

    - name: k8s-master2
      ip: 192.168.150.11

  workers:
    - name: k8s-worker1
      ip: 192.168.150.20
      data_disk_size: "50"

    - name: k8s-worker2
      ip: 192.168.150.21
      data_disk_size: "50"

# Kubernetes configuration (used by Day-1 Ansible, recorded here for reference)
k8s:
  container_runtime: "cri-o"
  cni: "Calico"
  k8s_version: "1.35"
  pod_network_cidr: "10.244.0.0/16"
  service_cidr: "10.96.0.0/12"
  operators:
    - topolvm-operator
